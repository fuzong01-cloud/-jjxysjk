{% extends "base.html" %}{% block content %}<header class="page-head"><div><p class="eyebrow">管理员设置</p><h1>账号安全</h1><p>当前账号：{{ user.username }}</p></div></header><section class="panel" style="max-width:620px"><h2>修改密码</h2><form id="passwordForm"><label>当前密码<input type="password" name="current_password" minlength="8" required></label><label>新密码<input type="password" name="new_password" minlength="10" required></label><label>再次输入新密码<input type="password" name="confirm_password" minlength="10" required></label><p id="result"></p><button>保存新密码</button></form></section>{% endblock %}{% block scripts %}<script>passwordForm.onsubmit=async(e)=>{e.preventDefault();const f=new FormData(e.target);if(f.get('new_password')!==f.get('confirm_password')){result.className='error';result.textContent='两次输入的新密码不一致';return}const r=await fetch('/api/v1/auth/password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:f.get('current_password'),new_password:f.get('new_password')})}),j=await r.json();result.className=r.ok?'':'error';result.textContent=r.ok?j.message:(j.detail||j.message||'修改失败');if(r.ok)e.target.reset()}</script>{% endblock %}
